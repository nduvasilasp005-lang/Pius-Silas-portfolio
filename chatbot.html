<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Host Me Ke — Chat</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary: #1a3c5e;
      --accent:  #e8a838;
      --light:   #f7f4ef;
      --gray:    #6b7280;
      --border:  #e2ddd6;
      --white:   #ffffff;
    }

    /* Fill the iframe completely — no fixed positioning needed */
    html, body {
      height: 100%;
      width: 100%;
      overflow: hidden;
      font-family: 'DM Sans', sans-serif;
      background: var(--white);
    }

    #chat-wrap {
      display: flex;
      flex-direction: column;
      height: 100%;
      width: 100%;
    }

    /* ── HEADER ── */
    .chat-header {
      background: linear-gradient(135deg, var(--primary) 0%, #2d6a9f 100%);
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }

    .chat-avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: var(--accent);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }

    .chat-header-text h3 {
      font-size: 14px;
      font-weight: 600;
      color: white;
      line-height: 1.2;
    }

    .chat-header-text p {
      font-size: 11px;
      color: rgba(255,255,255,0.65);
    }

    .online-dot {
      width: 7px;
      height: 7px;
      background: #4ade80;
      border-radius: 50%;
      display: inline-block;
      margin-right: 4px;
    }

    /* ── MESSAGES ── */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 14px 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      background: var(--light);
    }

    #messages::-webkit-scrollbar { width: 4px; }
    #messages::-webkit-scrollbar-track { background: transparent; }
    #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .msg {
      display: flex;
      gap: 8px;
      align-items: flex-end;
      max-width: 88%;
      animation: fadeUp 0.2s ease;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .msg.bot  { align-self: flex-start; }
    .msg.user { align-self: flex-end; flex-direction: row-reverse; }

    .msg-icon {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      background: var(--accent);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      flex-shrink: 0;
    }

    .msg.user .msg-icon {
      background: var(--primary);
    }

    .bubble {
      padding: 9px 13px;
      border-radius: 16px;
      font-size: 13px;
      line-height: 1.5;
      max-width: 100%;
      word-break: break-word;
    }

    .msg.bot .bubble {
      background: white;
      color: #222;
      border-bottom-left-radius: 4px;
      border: 1px solid var(--border);
    }

    .msg.user .bubble {
      background: var(--primary);
      color: white;
      border-bottom-right-radius: 4px;
    }

    /* Typing indicator */
    .typing-dots {
      display: flex;
      gap: 4px;
      padding: 12px 14px;
      align-items: center;
    }

    .typing-dots span {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--gray);
      animation: bounce 1s infinite;
    }

    .typing-dots span:nth-child(2) { animation-delay: 0.15s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.3s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); }
      40%           { transform: translateY(-6px); }
    }

    /* Quick reply chips */
    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      padding: 4px 0 2px;
    }

    .chip {
      padding: 5px 11px;
      border-radius: 20px;
      border: 1.5px solid var(--accent);
      background: white;
      color: var(--primary);
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      transition: all 0.15s;
    }

    .chip:hover {
      background: var(--accent);
      color: white;
    }

    /* ── INPUT BAR ── */
    .chat-input-bar {
      display: flex;
      gap: 8px;
      padding: 10px 12px;
      border-top: 1px solid var(--border);
      background: white;
      flex-shrink: 0;
      align-items: center;
    }

    #userInput {
      flex: 1;
      padding: 9px 13px;
      border: 1.5px solid var(--border);
      border-radius: 22px;
      font-size: 13px;
      font-family: 'DM Sans', sans-serif;
      outline: none;
      background: var(--light);
      transition: border-color 0.2s;
      color: #222;
    }

    #userInput:focus {
      border-color: var(--primary);
      background: white;
    }

    #userInput::placeholder { color: #aaa; }

    #sendBtn {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: var(--accent);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.2s, transform 0.15s;
    }

    #sendBtn:hover   { background: #d4952e; }
    #sendBtn:active  { transform: scale(0.92); }
    #sendBtn:disabled { background: #ddd; cursor: not-allowed; }

    #sendBtn svg { width: 16px; height: 16px; fill: white; }
  </style>
</head>
<body>

<div id="chat-wrap">

  <!-- Header -->
  <div class="chat-header">
    <div class="chat-avatar">🏠</div>
    <div class="chat-header-text">
      <h3>Host Me Ke Assistant</h3>
      <p><span class="online-dot"></span>Online · Replies instantly</p>
    </div>
  </div>

  <!-- Messages -->
  <div id="messages">
    <!-- Welcome message injected by JS -->
  </div>

  <!-- Input -->
  <div class="chat-input-bar">
    <input type="text" id="userInput" placeholder="Ask me anything…" autocomplete="off" />
    <button id="sendBtn" title="Send">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
      </svg>
    </button>
  </div>

</div>

<script>
  const messagesEl = document.getElementById('messages');
  const userInput  = document.getElementById('userInput');
  const sendBtn    = document.getElementById('sendBtn');

  // ── QUICK REPLY CHIPS shown on welcome ──
  const welcomeChips = [
    'Available properties',
    'Prices in Mombasa',
    'How to book',
    'Become a host',
  ];

  // ── Add a message bubble ──
  function addMessage(text, who, chips = []) {
    const wrap = document.createElement('div');
    wrap.classList.add('msg', who);

    const icon   = document.createElement('div');
    icon.classList.add('msg-icon');
    icon.textContent = who === 'bot' ? '🏠' : '👤';

    const bubble = document.createElement('div');
    bubble.classList.add('bubble');
    bubble.textContent = text;

    wrap.appendChild(icon);
    wrap.appendChild(bubble);

    if (chips.length) {
      const chipsWrap = document.createElement('div');
      chipsWrap.classList.add('chips');
      chips.forEach(label => {
        const btn = document.createElement('button');
        btn.classList.add('chip');
        btn.textContent = label;
        btn.addEventListener('click', () => {
          chipsWrap.remove();
          handleUserMessage(label);
        });
        chipsWrap.appendChild(btn);
      });
      // Attach chips inside the bot message column
      const col = document.createElement('div');
      col.style.cssText = 'display:flex;flex-direction:column;gap:6px;max-width:88%;';
      col.appendChild(wrap);
      col.appendChild(chipsWrap);
      messagesEl.appendChild(col);
      scrollBottom();
      return;
    }

    messagesEl.appendChild(wrap);
    scrollBottom();
  }

  // ── Typing indicator ──
  function showTyping() {
    const wrap = document.createElement('div');
    wrap.classList.add('msg', 'bot');
    wrap.id = 'typing';

    const icon = document.createElement('div');
    icon.classList.add('msg-icon');
    icon.textContent = '🏠';

    const bubble = document.createElement('div');
    bubble.classList.add('bubble');
    bubble.style.padding = '0';

    const dots = document.createElement('div');
    dots.classList.add('typing-dots');
    dots.innerHTML = '<span></span><span></span><span></span>';
    bubble.appendChild(dots);

    wrap.appendChild(icon);
    wrap.appendChild(bubble);
    messagesEl.appendChild(wrap);
    scrollBottom();
  }

  function hideTyping() {
    document.getElementById('typing')?.remove();
  }

  function scrollBottom() {
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  // ── Rule-based responses ──
  function ruleBasedResponse(text) {
    const t = text.toLowerCase();

    if (/\b(hi|hello|hey|habari|hujambo)\b/.test(t))
      return 'Hello! 👋 Welcome to Host Me Ke! Are you looking to book a stay, rent, or buy property in Kenya?';

    if (/\b(book|booking|reserve)\b/.test(t))
      return 'To book a property, browse the listings on this page, click the property you like, then hit "Book & Pay". You can pay securely with M-Pesa. Need help finding a property?';

    if (/\b(price|cost|how much|bei|rent|rates?)\b/.test(t))
      return 'Prices depend on location and type:\n• Hostays: from KES 8,500/night\n• Rentals: from KES 8,500/month\n• For sale: from KES 8.9M\n\nWhat is your budget?';

    if (/\b(mombasa|diani|malindi|nyali|bamburi|watamu|kilifi)\b/.test(t))
      return 'We have beautiful properties along the Kenyan coast 🌴 — Diani Beach, Watamu, Malindi, and Nyali. Shall I help you filter coastal listings?';

    if (/\b(nairobi|karen|westlands|ngong|kileleshwa)\b/.test(t))
      return 'We have listings in Karen, Westlands, Ngong Road, and more around Nairobi 🏙️. Any preference on type — hostay, rental, or for sale?';

    if (/\b(host|list|listing|property owner|landlord)\b/.test(t))
      return 'You can list your property on Host Me Ke! Click "Become a Host" in the top menu to get started. It\'s free to sign up 🚀';

    if (/\b(wifi|internet|amenities|facilities|parking|kitchen|security)\b/.test(t))
      return 'Most Host Me Ke properties include WiFi, kitchen, 24-hr security, and parking 🔒. Specific amenities are listed on each property card.';

    if (/\b(mpesa|m-pesa|pay|payment|lipa)\b/.test(t))
      return 'We accept M-Pesa payments! Click "Book & Pay" on any listing, enter your M-Pesa number, and you\'ll receive an STK push prompt on your phone 📱';

    if (/\b(cancel|refund|cancellation)\b/.test(t))
      return 'Cancellation policies vary by property. Please contact the host directly or reach out to our support team for refund queries.';

    if (/\b(contact|support|help|agent)\b/.test(t))
      return 'For support, you can reach the Host Me Ke team via the contact form or email support@hostme.ke. We\'re here to help! 😊';

    if (/\b(thank|thanks|asante)\b/.test(t))
      return 'You\'re welcome! 😊 Is there anything else I can help you with?';

    return null; // falls through to AI
  }

  // ── OpenAI fallback ──
  async function getAIResponse(userMessage) {
    try {
      const response = await fetch('https://api.openai.com/v1/chat/completions', {
        method: 'POST',
        headers: {
          'Authorization': 'Bearer your_API_key
            ',
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({
          model: 'gpt-4.1-mini',
          messages: [
            {
              role: 'system',
              content: `You are a friendly, helpful assistant for Host Me Ke — a Kenyan property platform for hostays (short-term stays), rentals, and property sales.
Speak naturally and concisely. Use Kenyan context where appropriate.
Keep replies under 3 sentences unless the user asks for details.
Always stay on-topic: property searches, bookings, pricing, hosting, M-Pesa payments, and Kenyan locations.`
            },
            { role: 'user', content: userMessage }
          ],
          max_tokens: 200,
          temperature: 0.7,
        })
      });

      const data = await response.json();
      if (data.error) throw new Error(data.error.message);
      return data.choices[0].message.content.trim();

    } catch (err) {
      console.error(err);
      return '⚠️ I\'m having trouble connecting right now. Please try again in a moment, or contact support@hostme.ke for help.';
    }
  }

  // ── Core send logic ──
  async function handleUserMessage(text) {
    if (!text.trim()) return;
    addMessage(text, 'user');
    userInput.value = '';
    sendBtn.disabled = true;

    showTyping();

    // Small delay so typing feels natural
    await new Promise(r => setTimeout(r, 600));

    let reply = ruleBasedResponse(text);
    if (!reply) reply = await getAIResponse(text);

    hideTyping();
    addMessage(reply, 'bot');
    sendBtn.disabled = false;
    userInput.focus();
  }

  sendBtn.addEventListener('click', () => handleUserMessage(userInput.value.trim()));
  userInput.addEventListener('keypress', e => {
    if (e.key === 'Enter' && !e.shiftKey) handleUserMessage(userInput.value.trim());
  });

  // ── Welcome message on load ──
  window.addEventListener('load', () => {
    addMessage(
      'Hello! 👋 Welcome to Host Me Ke. I can help you find properties, check prices, or learn how to book. What can I help you with?',
      'bot',
      welcomeChips
    );
  });
</script>

</body>
</html>
